<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelGuard — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <h1>FuelGuard Login</h1>
            <p class="subtitle" id="roleSubtitle">Sign in to continue.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <ul class="flash-list">
                {% for category, message in messages %}
                <li class="{{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('staff.login') }}" id="loginForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="field">
                    <label for="username" id="identityLabel">Email or Username</label>
                    <input id="username" name="username" type="text" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <div class="password-field">
                        <input id="password" name="password" type="password" autocomplete="current-password" required
                            data-password-toggle="true">
                    </div>
                </div>
                <div class="field">
                    <label for="role">Role</label>
                    <select id="role" name="role" required data-selected="{{ selected_role or 'sales' }}">
                        {% for value, label in role_labels.items() %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button class="btn btn-primary" type="submit">Sign in</button>
            </form>

            <div class="portal-links">
                <a href="{{ url_for('staff.register_page') }}">Create Account</a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/password-toggle.js') }}"></script>
</body>

</html>
