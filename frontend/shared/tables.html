<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelGuard - Data View Patterns</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="dashboard-body">
    <div class="dash-shell">
        <aside class="dash-side">
            <div class="side-brand">{% include 'shared/brand_logo.html' %}<div><div class="side-meta">Data Pattern</div></div></div>
        </aside>
        <main class="dash-content">
            <header class="dash-top">
                <div class="title-group"><h1>Smart Data Panel</h1><div class="meta">Minimal table with hover states, status pills, and compact controls</div></div>
            </header>
            <article class="panel">
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Record ID</th><th>Date</th><th>Station</th><th>Amount</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr><td>#4011</td><td>2026-04-21</td><td>North Depot</td><td>62.4 L</td><td><span class="status-pill">approved</span></td></tr>
                            <tr><td>#4012</td><td>2026-04-21</td><td>West Yard</td><td>44.8 L</td><td><span class="status-pill">pending</span></td></tr>
                            <tr><td>#4013</td><td>2026-04-20</td><td>Central Hub</td><td>70.0 L</td><td><span class="status-pill">rejected</span></td></tr>
                        </tbody>
                    </table>
                </div>
            </article>
        </main>
    </div>
</body>
</html>
